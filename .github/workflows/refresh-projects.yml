name: Refresh Projects

on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/generate-projects.ts"
      - ".github/workflows/refresh-projects.yml"

# Prevent overlapping runs from racing on push
concurrency:
  group: refresh-projects
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sentry cron — start
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          SENTRY_CHECK_IN_ID=$(uuidgen)
          echo "SENTRY_CHECK_IN_ID=$SENTRY_CHECK_IN_ID" >> $GITHUB_ENV
          # Extract DSN components
          DSN_KEY=$(echo "$SENTRY_DSN" | sed -n 's|https://\([^@]*\)@.*|\1|p')
          DSN_HOST=$(echo "$SENTRY_DSN" | sed -n 's|https://[^@]*@\([^/]*\)/.*|\1|p')
          DSN_PROJECT=$(echo "$SENTRY_DSN" | sed -n 's|.*/\([0-9]*\)$|\1|p')
          curl -sS "https://${DSN_HOST}/api/${DSN_PROJECT}/cron/weekly-portfolio-refresh/${SENTRY_CHECK_IN_ID}/" \
            -X POST \
            -H "Authorization: DSN $SENTRY_DSN" \
            -H "Content-Type: application/json" \
            -d '{"status":"in_progress","monitor_config":{"schedule":{"type":"crontab","value":"0 2 * * 0"},"checkin_margin":15,"max_runtime":10,"failure_issue_threshold":1,"recovery_threshold":1}}'

      - name: Generate projects
        id: generate
        env:
          GITHUB_TOKEN: ${{ secrets.PROJECT_SYNC_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
        run: npm run generate-projects

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code src/data/projects.generated.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/projects.generated.json
          git commit -m "chore: refresh projects data [skip ci]"
          git pull --rebase
          git push

      - name: Sentry cron — success
        if: success()
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          DSN_HOST=$(echo "$SENTRY_DSN" | sed -n 's|https://[^@]*@\([^/]*\)/.*|\1|p')
          DSN_PROJECT=$(echo "$SENTRY_DSN" | sed -n 's|.*/\([0-9]*\)$|\1|p')
          curl -sS "https://${DSN_HOST}/api/${DSN_PROJECT}/cron/weekly-portfolio-refresh/${SENTRY_CHECK_IN_ID}/" \
            -X PUT \
            -H "Authorization: DSN $SENTRY_DSN" \
            -H "Content-Type: application/json" \
            -d '{"status":"ok"}'

      - name: Sentry cron — failure
        if: failure()
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          DSN_HOST=$(echo "$SENTRY_DSN" | sed -n 's|https://[^@]*@\([^/]*\)/.*|\1|p')
          DSN_PROJECT=$(echo "$SENTRY_DSN" | sed -n 's|.*/\([0-9]*\)$|\1|p')
          curl -sS "https://${DSN_HOST}/api/${DSN_PROJECT}/cron/weekly-portfolio-refresh/${SENTRY_CHECK_IN_ID}/" \
            -X PUT \
            -H "Authorization: DSN $SENTRY_DSN" \
            -H "Content-Type: application/json" \
            -d '{"status":"error"}'
