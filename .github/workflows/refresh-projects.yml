name: Refresh Projects

on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/generate-projects.ts"
      - ".github/workflows/refresh-projects.yml"

# Prevent overlapping runs from racing on push
concurrency:
  group: refresh-projects
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sentry cron — start
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          SENTRY_CHECK_IN_ID=$(node -e "
            const Sentry = require('@sentry/node');
            Sentry.init({ dsn: process.env.SENTRY_DSN });
            const id = Sentry.captureCheckIn(
              { monitorSlug: 'weekly-portfolio-refresh', status: 'in_progress' },
              {
                schedule: { type: 'crontab', value: '0 2 * * 0' },
                checkinMargin: 30,
                maxRuntime: 15,
                timezone: 'Etc/UTC',
              }
            );
            Sentry.close(5000).then(() => console.log(id));
          ")
          echo "SENTRY_CHECK_IN_ID=$SENTRY_CHECK_IN_ID" >> $GITHUB_ENV

      - name: Generate projects
        id: generate
        env:
          GITHUB_TOKEN: ${{ secrets.PROJECT_SYNC_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
        run: npm run generate-projects

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code src/data/projects.generated.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/projects.generated.json
          git commit -m "chore: refresh projects data [skip ci]"
          git pull --rebase
          git push

      - name: Sentry cron — success
        if: success()
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          node -e "
            const Sentry = require('@sentry/node');
            Sentry.init({ dsn: process.env.SENTRY_DSN });
            Sentry.captureCheckIn({ checkInId: process.env.SENTRY_CHECK_IN_ID, monitorSlug: 'weekly-portfolio-refresh', status: 'ok' });
            Sentry.close(5000).then(() => console.log('Sentry cron: ok'));
          "

      - name: Sentry cron — failure
        if: failure()
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          node -e "
            const Sentry = require('@sentry/node');
            Sentry.init({ dsn: process.env.SENTRY_DSN });
            Sentry.captureCheckIn({ checkInId: process.env.SENTRY_CHECK_IN_ID, monitorSlug: 'weekly-portfolio-refresh', status: 'error' });
            Sentry.close(5000).then(() => console.log('Sentry cron: error'));
          "
